<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Lovepreet ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

</head>

<body>

<!-- Floating Hearts -->
<div id="hearts"></div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="music/song.mp3" type="audio/mp3">
</audio>

<!-- Main Card -->
<div class="container">

<!-- PAGE 1 -->

<section id="page1" class="page active">

<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=700"
class="mainImage">

<h1>💖 Hey Lovepreet 💖</h1>

<p>

Someone has a little surprise for you...

</p>

<button id="clickBtn">

💌 Click Me

</button>

</section>

<!-- PAGE 2 -->

<section id="page2" class="page">

<h1>🥺 Before Going Ahead...</h1>

<p>

Do you really want to continue?

</p>

<div class="buttonBox">

<button id="continueBtn">

❤️ Continue

</button>

<button id="discontinueBtn">

💔 Discontinue

</button>

</div>

</section>

<!-- PAGE 3 -->

<section id="page3" class="page">

<img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=700"
class="mainImage">

<h1>Dear Lovepreet ❤️</h1>

<p id="typing"></p>

<button id="punishmentBtn">

😔 Accept My Punishment

</button>

<div id="punishmentArea"></div>

<br>

<button id="forgiveBtn">

💖 I Forgive You

</button>

<button id="noBtn">

🙈 Not Yet

</button>

<div id="message"></div>

</section>

</div>

<script src="script.js"></script>

</body>

</html>
